<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="potGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E85D04"/>
      <stop offset="100%" style="stop-color:#C44D00"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="14" fill="#FFF3E0"/>
  <!-- Steam -->
  <path d="M10 8 Q11 6 10 4" fill="none" stroke="#E85D04" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <path d="M16 7 Q17 5 16 3" fill="none" stroke="#E85D04" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <path d="M22 8 Q23 6 22 4" fill="none" stroke="#E85D04" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- Pot body -->
  <ellipse cx="16" cy="20" rx="10" ry="6" fill="url(#potGradient)"/>
  <!-- Pot rim -->
  <ellipse cx="16" cy="14" rx="10" ry="3" fill="#E85D04"/>
  <!-- Pot lid -->
  <ellipse cx="16" cy="13" rx="8" ry="2" fill="#FF8C42"/>
  <!-- Lid handle -->
  <ellipse cx="16" cy="11" rx="2" ry="1" fill="#C44D00"/>
</svg>
