<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0"/>
      <stop offset="100%" style="stop-color:#FFFBF7"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad2)"/>
  
  <!-- Decorative Elements -->
  <circle cx="50" cy="50" r="80" fill="#E85D04" opacity="0.1"/>
  <circle cx="550" cy="350" r="100" fill="#E85D04" opacity="0.1"/>
  
  <!-- Main Image Area -->
  <rect x="100" y="50" width="400" height="300" rx="20" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
  
  <!-- Kitchen Scene -->
  <rect x="100" y="50" width="400" height="200" rx="20" fill="#FFF8F0"/>
  
  <!-- Chef Illustration -->
  <circle cx="300" cy="150" r="50" fill="#FFE4C4"/>
  <text x="300" y="165" font-family="Arial, sans-serif" font-size="50" text-anchor="middle">👩‍🍳</text>
  
  <!-- Cooking Items -->
  <text x="180" y="180" font-family="Arial, sans-serif" font-size="40">🍲</text>
  <text x="380" y="180" font-family="Arial, sans-serif" font-size="40">🥘</text>
  <text x="220" y="120" font-family="Arial, sans-serif" font-size="30">🌶️</text>
  <text x="360" y="120" font-family="Arial, sans-serif" font-size="30">🧅</text>
  
  <!-- Text Area -->
  <text x="300" y="290" font-family="Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Home Chefs Preparing with Love</text>
  <text x="300" y="320" font-family="Arial, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">Fresh, hygienic, and delicious homemade meals</text>
</svg>
